<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couverture - 500</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scene">
        <div class="book-wrap">
            <div class="book-face front">
                <header class="top-section">
                    <span class="author">KEY LIA</span>
                    <h1 class="title">500</h1>
                </header>
                <main class="bottom-section">
                    <div id="cascade-container"></div>
                </main>
            </div>
            
            <div class="book-face spine"></div> <div class="book-face top"></div>   <div class="book-face bottom"></div> <div class="book-face back"></div>   </div>
    </div>

    <div class="pentagon-wrapper">
        <div class="pentagon-container">
            <div class="orbit-ring"></div>
            <div class="center-data">
                <div class="project-logo">500</div>
                <div class="data-stream">SCANNING...</div>
            </div>

            <div class="city-card loc-1">
                <div class="city-image" style="background-image: url('../assets/images/lieu_1_altitude.webp');"></div>
                <div class="city-info-bar"><h2 class="city-name">Altitude</h2></div>
            </div>
            <div class="city-card loc-2">
                <div class="city-image" style="background-image: url('../assets/images/lieu_2_archipel.webp');"></div>
                <div class="city-info-bar"><h2 class="city-name">Archipel</h2></div>
            </div>
            <div class="city-card loc-3">
                <div class="city-image" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1000&auto=format&fit=crop');"></div>
                <div class="city-info-bar"><h2 class="city-name">Bourg</h2></div>
            </div>
            <div class="city-card loc-4">
                <div class="city-image" style="background-image: url('https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?q=80&w=1000&auto=format&fit=crop');"></div>
                <div class="city-info-bar"><h2 class="city-name">Désert</h2></div>
            </div>
            <div class="city-card loc-5">
                <div class="city-image" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1000&auto=format&fit=crop');"></div>
                <div class="city-info-bar"><h2 class="city-name">Refuge</h2></div>
            </div>
        </div>
    </div>
</div>

    <script src="js/main.js"></script>
</body>
</html>
